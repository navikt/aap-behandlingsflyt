name: Generer openapi schema

on:
    push:
        branches: [ main ]
        paths-ignore:
            - '.github/pr-test-parallell.yml'
            - '*.md'
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            packages: write
            checks: write
            actions: write
            deployments: write
        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            -   uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
                with:
                    java-version: 25
                    distribution: 'temurin'
            -   name: Setup Gradle for a non-wrapper project
                uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
                with:
                    gradle-version: wrapper
            -   name: Bygg & test
                run: ./gradlew genererOpenApiJson
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
                with:
                    repository: navikt/aap-backend-typescript-types
                    path: ./aap-backend-typescript-types
                    token: ${{ secrets.github_token }}
            -   uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                id: artifact-upload-step
                with:
                    name: openapi
                    path: ./openapi.json
                    overwrite: 'true'
            - uses: navikt/github-app-token-generator@b96ff604b2300989cd1105e3fad09199fca56681 # v1.2.1
              id: get-token
              with:
                  app-id: "${{ secrets.TEAM_AAP_GITHUB_APP_ID }}"
                  private-key: "${{ secrets.TEAM_AAP_GITHUB_APP_PRIVATE_KEY }}"
                  repo: navikt/aap-backend-typescript-types
            -   uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
                with:
                    github-token: ${{ steps.get-token.outputs.token }}
                    script: |
                        const fs = require('fs');
                        await github.rest.actions.createWorkflowDispatch({
                            owner: 'navikt',
                            repo: 'aap-backend-typescript-types',
                            workflow_id: 'publish-and-release.yml',
                            ref: 'main',
                            inputs: {
                                'artifactId': '${{steps.artifact-upload-step.outputs.artifact-id}}',
                                'appNavn': 'behandlingsflyt'
                            }
                        })