name: Pull Request

on:
    pull_request:
    workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest-8-cores
        timeout-minutes: 25
        permissions:
            contents: read
            id-token: write
            packages: write
            checks: write
        strategy:
          fail-fast: false
          matrix:
            gradle_args: [":api:check", ":app:check", ":behandlingsflyt:check", ":kontrakt:check", ":lib-test:check", ":repository:check"]
        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            -   uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: 25
                    distribution: 'temurin'

            - name: Setup Gradle for a non-wrapper project
              uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
              with:
                  gradle-version: wrapper
            - name: Bygg og test (${{matrix.gradle_args}})
              run: ./gradlew ${{matrix.gradle_args}} --continue --stacktrace
            - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
              if: success() || failure()
              with:
                name: test
                path: "**/build/test-results/test/TEST-*.xml"
                reporter: java-junit
                token: ${{ secrets.GITHUB_TOKEN }}
            - name: Publish Test Report
              uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
              if: success() || failure() # always run even if the previous step fails
              with:
                report_paths: '**/build/test-results/test/TEST-*.xml'
                check_name: 'JUnit Test Report for ${{ matrix.gradle_args }}'
