on:
    workflow_dispatch:
        inputs:
            tag:
                description: "version"
                required: true
                type: string


jobs:
    publiser-kontrakt:
        permissions:
            contents: write
            packages: write
            id-token: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
              with:
                  java-version: 25
                  distribution: 'temurin'

            - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
              with:
                  gradle-version: wrapper

            - id: notes
              run: |
                  randomDelimiter=${RANDOM}
                  text=$(git --no-pager log $(git describe --tags --abbrev=0)..HEAD --pretty=format:"%h %s" | sed ':a;N;$!ba;s/\n/\n\n/g')
                  echo 'CHANGELOG<<$randomDelimiter' >> $GITHUB_OUTPUT
                  echo -e "$text" >> $GITHUB_OUTPUT
                  echo '$randomDelimiter' >> $GITHUB_OUTPUT

            - run: |
                  ./gradlew -Pversion=${{ inputs.tag }} publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create tag
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      github.rest.git.createRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: 'refs/tags/${{ inputs.tag }}',
                          sha: context.sha
                      })
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create release
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      github.rest.repos.createRelease({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          tag_name: '${{ inputs.tag }}',
                          name: '${{ inputs.tag }}',
                          body: '${{ steps.notes.outputs.CHANGELOG }}',
                      })
                  github-token: ${{ secrets.GITHUB_TOKEN }}
