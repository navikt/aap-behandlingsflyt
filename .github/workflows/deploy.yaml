name: Bygg og deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/pr-test-parallell.yml'
      - '*.md'
      - '.run/*'
      - 'docker-compose.yaml'
  workflow_dispatch:
    inputs:
      cluster:
        description: Cluster
        required: true
        default: dev-gcp
        type: choice
        options:
          - dev-gcp
          - prod-gcp

jobs:
  build:
    name: Bygg og test og push
    runs-on: ubuntu-latest-8-cores
    permissions:
        contents: read
        id-token: write
        packages: write
        checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
            gradle-version: wrapper
      - name: Bygg & test
        run: ./gradlew clean build --continue --stacktrace

      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: test
          path: "**/build/test-results/test/TEST-*.xml"
          reporter: java-junit
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
            name: reports
            path: |
                **/build/reports/
                **/build/test-results

      - uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        id: docker-push
        with:
            team: aap # required

    outputs:
        image: ${{ steps.docker-push.outputs.image }}

  bygg-docs:
    name: Bygg docs
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
        contents: read
        id-token: write
        packages: write
        checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: 25
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
            gradle-version: wrapper
      - name: Genererer docs
        run: |
          ./gradlew dokkaGenerate
      - name: upload-artifact for docs
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './docs/build/dokka/html'


  deploy-pages:
    runs-on: ubuntu-latest
    needs: bygg-docs
    concurrency:
      group: docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.test.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0


  publiser-kontrakt:
      needs: build
      concurrency:
          group: kontrakt
      permissions:
          contents: write
          packages: write
          id-token: write
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            with:
                fetch-depth: 0
            #  Ha denne tidlig, så action kan skippe raskt om ingen endringer.
          - uses: paulhatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
            id: tag
            with:
                change_path: "kontrakt/"
                bump_each_commit: true
                tag_prefix: ""
                bump_each_commit_patch_pattern: ''
                major_pattern: "(MAJOR)" # If major bump, include this in the commit message
          - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
            if: ${{ steps.tag.outputs.version_type != 'none' }}
            with:
                java-version: 25
                distribution: 'temurin'
          - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
            with:
                gradle-version: wrapper
          - id: notes
            if: ${{ steps.tag.outputs.version_type != 'none' }}
            run: |
                randomDelimiter=${RANDOM}
                text=$(git --no-pager log $(git describe --tags --abbrev=0)..HEAD --pretty=format:"%h %s" | sed ':a;N;$!ba;s/\n/\n\n/g')
                echo 'CHANGELOG<<$randomDelimiter' >> $GITHUB_OUTPUT
                echo -e "$text" >> $GITHUB_OUTPUT
                echo '$randomDelimiter' >> $GITHUB_OUTPUT
          - if: ${{ steps.tag.outputs.version_type != 'none' }}
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: |
                ./gradlew -Pversion=${{ steps.tag.outputs.version }} publish
          - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
            if: ${{ steps.tag.outputs.version_type != 'none' }}
            id: create_release
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            with:
                tag_name: ${{ steps.tag.outputs.version }}
                name: ${{ steps.tag.outputs.version }}
                body: |
                    Endringer siden sist:
                    ${{ steps.notes.outputs.CHANGELOG }}                

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    permissions:
        contents: read
        id-token: write
    concurrency:
      group: deploy-dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          PRINT_PAYLOAD: true
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev.yaml
          VAR: image=${{ needs.build.outputs.image }}

  deploy-prod:
      if: ${{ github.ref == 'refs/heads/main' }}
      needs: [publiser-kontrakt, deploy-dev, build]
      runs-on: ubuntu-latest
      concurrency:
        group: deploy-prod
      permissions:
          contents: read
          id-token: write
      steps:
          - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
          - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
            env:
                PRINT_PAYLOAD: true
                CLUSTER: prod-gcp
                RESOURCE: .nais/prod.yaml
                VAR: image=${{ needs.build.outputs.image }}
